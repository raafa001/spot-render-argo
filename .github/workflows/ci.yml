name: Argo Workflows CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Yamllint
        run: pip install yamllint && yamllint workflows scripts
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.worker
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/spot-render-worker:${{ github.sha }}
