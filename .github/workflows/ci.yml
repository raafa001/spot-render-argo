name: Argo Workflows CI

on:
  push:
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-24.04
    env:
      WORKER_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/spot-render-worker:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Yamllint
        run: pip install yamllint && yamllint workflows scripts
      - uses: docker/setup-buildx-action@v3
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile.worker
          push: true
          tags: ${{ env.WORKER_IMAGE }}
      - uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0
      - name: Deploy Workflow Templates
        if: github.ref == 'refs/heads/main'
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          tmp_render=$(mktemp)
          tmp_render_local=$(mktemp)
          sed "s|sha-PLACEHOLDER|sha-${{ github.sha }}|g" workflows/render.yaml > "$tmp_render"
          sed "s|sha-PLACEHOLDER|sha-${{ github.sha }}|g" workflows/render-local.yaml > "$tmp_render_local"
          kubectl apply -f "$tmp_render"
          kubectl apply -f "$tmp_render_local"
